name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint + offline tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check (advisory)
        run: ruff format --check . || echo "::warning::ruff format would reshape files — not blocking CI"

      - name: Compile-check all Python
        run: |
          python -m py_compile scripts/local_coder_browser.py
          python -m py_compile scripts/local_coder_cli.py
          python -m py_compile mcp/arcade/server.py
          python -m py_compile ops/daily_control_win.py

      - name: Offline unit tests
        # Live integration tests need a running server + Ollama, so deselect them.
        run: pytest -m "not live" -q

  typecheck:
    name: mypy (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - run: mypy scripts/local_coder_cli.py ops/daily_control_win.py
